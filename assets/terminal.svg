<svg xmlns="http://www.w3.org/2000/svg" width="820" height="680" viewBox="0 0 820 680">
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(680px); }
    }
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.8; }
      94% { opacity: 1; }
    }
    @keyframes title1 {
      0%, 30% { opacity: 1; }
      33%, 63% { opacity: 0; }
      66%, 96% { opacity: 0; }
      99%, 100% { opacity: 0; }
    }
    @keyframes title2 {
      0%, 30% { opacity: 0; }
      33%, 63% { opacity: 1; }
      66%, 96% { opacity: 0; }
      99%, 100% { opacity: 0; }
    }
    @keyframes title3 {
      0%, 30% { opacity: 0; }
      33%, 63% { opacity: 0; }
      66%, 96% { opacity: 1; }
      99%, 100% { opacity: 0; }
    }
    @keyframes status1 {
      0%, 30% { opacity: 1; }
      33%, 63% { opacity: 0; }
      66%, 96% { opacity: 0; }
      99%, 100% { opacity: 0; }
    }
    @keyframes status2 {
      0%, 30% { opacity: 0; }
      33%, 63% { opacity: 1; }
      66%, 96% { opacity: 0; }
      99%, 100% { opacity: 0; }
    }
    @keyframes status3 {
      0%, 30% { opacity: 0; }
      33%, 63% { opacity: 0; }
      66%, 96% { opacity: 1; }
      99%, 100% { opacity: 0; }
    }
    @keyframes signal-pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes typewriter-title1 {
      0% { width: 0; }
      5% { width: 0; }
      28% { width: 290px; }
      30% { width: 290px; }
      33% { width: 0; }
      100% { width: 0; }
    }
    @keyframes typewriter-title2 {
      0%, 33% { width: 0; }
      36% { width: 0; }
      58% { width: 230px; }
      63% { width: 230px; }
      66% { width: 0; }
      100% { width: 0; }
    }
    @keyframes typewriter-title3 {
      0%, 66% { width: 0; }
      69% { width: 0; }
      91% { width: 260px; }
      96% { width: 260px; }
      99% { width: 0; }
      100% { width: 0; }
    }
    @keyframes typewriter-status1 {
      0% { width: 0; }
      5% { width: 0; }
      28% { width: 210px; }
      30% { width: 210px; }
      33% { width: 0; }
      100% { width: 0; }
    }
    @keyframes typewriter-status2 {
      0%, 33% { width: 0; }
      36% { width: 0; }
      58% { width: 260px; }
      63% { width: 260px; }
      66% { width: 0; }
      100% { width: 0; }
    }
    @keyframes typewriter-status3 {
      0%, 66% { width: 0; }
      69% { width: 0; }
      91% { width: 250px; }
      96% { width: 250px; }
      99% { width: 0; }
      100% { width: 0; }
    }
    .terminal-bg {
      fill: #0a0a0a;
      rx: 12;
      ry: 12;
    }
    .terminal-border {
      fill: none;
      stroke: #00ff41;
      stroke-width: 2;
      rx: 12;
      ry: 12;
      filter: drop-shadow(0 0 6px rgba(0, 255, 65, 0.3));
    }
    .titlebar {
      fill: #111111;
      rx: 12;
      ry: 12;
    }
    .titlebar-cover {
      fill: #111111;
    }
    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #febc2e; }
    .dot-green { fill: #28c840; }
    .terminal-title {
      fill: #00ff41;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      font-weight: 700;
      text-anchor: middle;
      letter-spacing: 1px;
    }
    .ascii-text {
      fill: #00ff41;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 11px;
      animation: flicker 8s infinite;
    }
    .label-text {
      fill: #00ff41;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      font-weight: 700;
    }
    .value-text {
      fill: #00ff41;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
    }
    .cursor {
      fill: #00ff41;
      animation: blink 1s step-end infinite;
    }
    .scanline-bar {
      fill: rgba(0, 255, 65, 0.03);
      animation: scanline 6s linear infinite;
    }
    .signal-bar-on {
      fill: #00ff41;
      animation: signal-pulse 2s ease-in-out infinite;
    }
    .signal-bar-off {
      fill: #1a3a1a;
    }
    .title-cycle-1 { animation: title1 9s infinite; }
    .title-cycle-2 { animation: title2 9s infinite; }
    .title-cycle-3 { animation: title3 9s infinite; }
    .status-cycle-1 { animation: status1 9s infinite; }
    .status-cycle-2 { animation: status2 9s infinite; }
    .status-cycle-3 { animation: status3 9s infinite; }
    .tw-title-1 { animation: typewriter-title1 9s steps(30, end) infinite; overflow: hidden; }
    .tw-title-2 { animation: typewriter-title2 9s steps(24, end) infinite; overflow: hidden; }
    .tw-title-3 { animation: typewriter-title3 9s steps(26, end) infinite; overflow: hidden; }
    .tw-status-1 { animation: typewriter-status1 9s steps(22, end) infinite; overflow: hidden; }
    .tw-status-2 { animation: typewriter-status2 9s steps(26, end) infinite; overflow: hidden; }
    .tw-status-3 { animation: typewriter-status3 9s steps(25, end) infinite; overflow: hidden; }
    .glow {
      filter: drop-shadow(0 0 4px rgba(0, 255, 65, 0.5));
    }
    .dim { opacity: 0.5; }
    .bright { 
      fill: #33ff66;
      filter: drop-shadow(0 0 2px rgba(0, 255, 65, 0.8));
    }
  </style>

  <defs>
    <clipPath id="clip-title-1"><rect x="0" y="0" class="tw-title-1" height="20"/></clipPath>
    <clipPath id="clip-title-2"><rect x="0" y="0" class="tw-title-2" height="20"/></clipPath>
    <clipPath id="clip-title-3"><rect x="0" y="0" class="tw-title-3" height="20"/></clipPath>
    <clipPath id="clip-status-1"><rect x="0" y="0" class="tw-status-1" height="20"/></clipPath>
    <clipPath id="clip-status-2"><rect x="0" y="0" class="tw-status-2" height="20"/></clipPath>
    <clipPath id="clip-status-3"><rect x="0" y="0" class="tw-status-3" height="20"/></clipPath>
  </defs>

  <!-- Terminal Window -->
  <rect class="terminal-bg" x="2" y="2" width="816" height="676"/>
  <rect class="terminal-border" x="2" y="2" width="816" height="676"/>
  
  <!-- Title Bar -->
  <rect class="titlebar" x="2" y="2" width="816" height="36"/>
  <rect class="titlebar-cover" x="2" y="26" width="816" height="12"/>
  <line x1="2" y1="38" x2="818" y2="38" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
  <circle class="dot-red" cx="22" cy="20" r="6"/>
  <circle class="dot-yellow" cx="42" cy="20" r="6"/>
  <circle class="dot-green" cx="62" cy="20" r="6"/>
  <text class="terminal-title" x="410" y="24">SAYN://TERMINAL v2.0 — [AGENTIC OS]</text>

