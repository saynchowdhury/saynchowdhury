  <!-- Separator line -->
  <line x1="40" y1="435" x2="780" y2="435" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>

  <!-- IDENTITY line -->
  <text class="label-text glow" x="60" y="465">&gt; IDENTITY:</text>
  <text class="value-text" x="185" y="465">Sayan Chowdhury</text>

  <!-- TITLE line with animated cycling text -->
  <text class="label-text glow" x="60" y="490">&gt; TITLE   :</text>
  
  <g transform="translate(185, 477)">
    <g clip-path="url(#clip-title-1)">
      <text class="value-text title-cycle-1" x="0" y="13">Father of Agentic Economics</text>
    </g>
    <g clip-path="url(#clip-title-2)">
      <text class="value-text title-cycle-2" x="0" y="13">Architect of the Swarm</text>
    </g>
    <g clip-path="url(#clip-title-3)">
      <text class="value-text title-cycle-3" x="0" y="13">Post-Human Market Maker</text>
    </g>
  </g>
  
  <!-- Blinking cursor for title -->
  <rect class="cursor" x="490" y="480" width="8" height="14" rx="1"/>

  <!-- STATUS line with animated cycling text -->
