  <text class="ascii-text glow" x="135" y="348">██▓▒░░░░░░▒▓████████████▓▒░░░░░░▒▓██</text>
  <text class="ascii-text glow" x="131" y="364">██▓▒░░░░░░░░░░▒▒▓▓▓▓▓▓▒▒░░░░░░░░░▒▓██</text>
